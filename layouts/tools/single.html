{{ define "main" }}
<article class="post-single">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
  </header>
  <div class="post-content">
    <ul>
      {{ range .Site.Params.angularApps }}
      <li>
        <a href="{{ if .url }}{{ .url }}{{ else }}/{{ .path }}{{ end }}">{{ .name }}</a>
        {{ with .description }} — {{ . }}{{ end }}
      </li>
      {{ end }}
    </ul>
  </div>
</article>
{{ end }}
